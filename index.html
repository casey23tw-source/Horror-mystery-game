<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0d0d0f">
<title>暗室 v3 — AI 推理劇本殺</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=Share+Tech+Mono&family=Noto+Serif+TC:wght@300;400;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0d0d0f;--bg2:#111116;--bg3:#17171e;--bg4:#1e1e28;
  --line:#252530;--dim:#3a3a4a;--muted:#606075;
  --body:#b0b0c8;--bright:#e5e5f0;
  --red:#b03020;--red2:#d44030;--red-glow:rgba(176,48,32,.25);
  --amber:#c89010;--amber2:#e8b030;
  --teal:#186858;--teal2:#22a890;
  --blue:#204878;--blue2:#3070c0;
  --mono:'Share Tech Mono',monospace;
  --serif:'EB Garamond','Noto Serif TC',serif;
  --display:'Playfair Display','Noto Serif TC',serif;
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;background:var(--bg);color:var(--body);font-family:var(--serif);overflow:hidden;}
body::after{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='.025'/%3E%3C/svg%3E");pointer-events:none;z-index:9999;mix-blend-mode:overlay;}

/* ── SCREENS ── */
.screen{display:none;width:100%;height:100%;}
.screen.active{display:flex;}

/* ── TITLE ── */
#screen-title{flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:40px 24px;overflow:hidden;position:relative;}
.title-grid{position:absolute;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 48px,rgba(255,255,255,.008) 48px,rgba(255,255,255,.008) 49px),repeating-linear-gradient(90deg,transparent,transparent 48px,rgba(255,255,255,.008) 48px,rgba(255,255,255,.008) 49px);pointer-events:none;}
.eyebrow{font-family:var(--mono);font-size:9px;letter-spacing:.55em;color:var(--red2);margin-bottom:30px;animation:pulse 3s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.logo{font-family:var(--display);font-size:clamp(72px,18vw,124px);font-weight:700;color:var(--bright);line-height:.85;letter-spacing:-.03em;margin-bottom:8px;}
.logo .sl{color:var(--red2);font-style:italic;}
.tagline{font-family:var(--serif);font-style:italic;font-size:clamp(12px,2vw,15px);color:var(--muted);letter-spacing:.15em;margin-bottom:48px;}
.diff-row{display:flex;gap:8px;margin-bottom:14px;}
.dbtn{font-family:var(--mono);font-size:10px;letter-spacing:.2em;text-transform:uppercase;padding:9px 20px;border:1px solid var(--line);background:transparent;color:var(--muted);cursor:pointer;transition:all .2s;}
.dbtn:hover{border-color:var(--dim);color:var(--body);}
.dbtn.sel{border-color:var(--amber);color:var(--amber);background:rgba(200,144,16,.06);}
.diff-desc{font-family:var(--mono);font-size:9px;color:var(--dim);letter-spacing:.1em;height:14px;margin-bottom:36px;}
.enter-btn{font-family:var(--mono);font-size:11px;letter-spacing:.4em;text-transform:uppercase;padding:15px 50px;background:var(--red);border:none;color:#fff;cursor:pointer;transition:all .25s;position:relative;overflow:hidden;}
.enter-btn::after{content:'';position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(255,255,255,.1),transparent);transform:translateX(-100%);transition:transform .5s;}
.enter-btn:hover::after{transform:translateX(100%);}
.enter-btn:hover{background:var(--red2);transform:translateY(-1px);box-shadow:0 8px 28px var(--red-glow);}
.enter-btn:disabled{background:var(--dim);cursor:not-allowed;transform:none;box-shadow:none;}
.history-btn{margin-top:16px;font-family:var(--mono);font-size:9px;letter-spacing:.3em;text-transform:uppercase;padding:8px 20px;background:transparent;border:1px solid var(--line);color:var(--muted);cursor:pointer;transition:all .2s;}
.history-btn:hover{border-color:var(--dim);color:var(--body);}
.resume-banner{display:none;margin-top:20px;padding:14px 18px;border:1px solid var(--amber);background:rgba(200,144,16,.06);max-width:380px;width:100%;text-align:left;}
.resume-banner.show{display:block;}
.resume-banner-label{font-family:var(--mono);font-size:8px;letter-spacing:.35em;color:var(--amber);text-transform:uppercase;margin-bottom:6px;}
.resume-banner-title{font-family:var(--display);font-style:italic;font-size:16px;color:var(--bright);margin-bottom:2px;}
.resume-banner-meta{font-family:var(--mono);font-size:9px;color:var(--muted);letter-spacing:.08em;margin-bottom:10px;}
.resume-banner-btns{display:flex;gap:8px;}
.resume-continue{font-family:var(--mono);font-size:9px;letter-spacing:.2em;padding:7px 16px;background:var(--amber);color:var(--bg);border:none;cursor:pointer;transition:all .2s;font-weight:bold;}
.resume-continue:hover{background:var(--amber2);}
.resume-discard{font-family:var(--mono);font-size:9px;letter-spacing:.2em;padding:7px 14px;background:transparent;border:1px solid var(--line);color:var(--muted);cursor:pointer;transition:all .2s;}
.resume-discard:hover{border-color:var(--red2);color:var(--red2);}
.autosave-dot{position:fixed;bottom:14px;right:14px;width:7px;height:7px;border-radius:50%;background:var(--teal2);opacity:0;z-index:50;pointer-events:none;}
@keyframes savePulse{0%{transform:scale(1);opacity:1}50%{opacity:1}100%{transform:scale(2.8);opacity:0}}
.autosave-dot.saving{animation:savePulse .8s ease forwards;}
/* BGM */
.bgm-ctrl{display:flex;align-items:center;gap:7px;flex-shrink:0;}
.bgm-btn{font-family:var(--mono);font-size:13px;background:transparent;border:1px solid var(--line);color:var(--muted);width:26px;height:26px;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;padding:0;}
.bgm-btn:hover{border-color:var(--amber);color:var(--amber);}
.bgm-btn.playing{color:var(--amber);border-color:var(--amber);animation:bgmPulse 2s infinite;}
@keyframes bgmPulse{0%,100%{box-shadow:none}50%{box-shadow:0 0 8px rgba(200,144,16,.4)}}
.bgm-vol{-webkit-appearance:none;appearance:none;width:56px;height:2px;background:var(--line);outline:none;cursor:pointer;}
.bgm-vol::-webkit-slider-thumb{-webkit-appearance:none;width:10px;height:10px;border-radius:50%;background:var(--amber);cursor:pointer;}
.bgm-label{font-family:var(--mono);font-size:8px;letter-spacing:.1em;color:var(--dim);max-width:70px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
@media(max-width:640px){.bgm-label{display:none;}.bgm-vol{width:44px;}}

/* ── LOADING ── */
#screen-loading{flex-direction:column;align-items:center;justify-content:center;gap:22px;}
.ld-title{font-family:var(--mono);font-size:10px;letter-spacing:.45em;color:var(--muted);}
.ld-wrap{width:260px;height:2px;background:var(--line);}
.ld-bar{height:100%;background:var(--red);width:0%;transition:width .3s;box-shadow:0 0 10px var(--red);}
.ld-log{font-family:var(--mono);font-size:10px;color:var(--dim);height:16px;letter-spacing:.05em;}

/* ── HISTORY SCREEN ── */
#screen-history{flex-direction:column;align-items:center;padding:40px 24px;overflow-y:auto;gap:20px;}
.hist-title{font-family:var(--display);font-size:clamp(28px,6vw,44px);color:var(--bright);}
.hist-empty{font-family:var(--serif);font-style:italic;color:var(--muted);font-size:16px;}
.hist-list{width:100%;max-width:600px;display:flex;flex-direction:column;gap:10px;}
.hist-card{background:var(--bg2);border:1px solid var(--line);padding:18px 20px;cursor:pointer;transition:all .2s;display:flex;justify-content:space-between;align-items:flex-start;gap:16px;}
.hist-card:hover{border-color:var(--dim);transform:translateX(4px);}
.hist-card-l{flex:1;min-width:0;}
.hist-card-title{font-family:var(--display);font-style:italic;font-size:17px;color:var(--bright);margin-bottom:4px;}
.hist-card-meta{font-family:var(--mono);font-size:9px;color:var(--muted);letter-spacing:.1em;}
.hist-card-r{text-align:right;flex-shrink:0;}
.hist-verdict{font-family:var(--mono);font-size:9px;letter-spacing:.2em;text-transform:uppercase;}
.hist-verdict.win{color:var(--teal2)}.hist-verdict.lose{color:var(--red2);}
.hist-back{font-family:var(--mono);font-size:10px;letter-spacing:.3em;padding:10px 24px;background:transparent;border:1px solid var(--line);color:var(--muted);cursor:pointer;transition:all .2s;}
.hist-back:hover{border-color:var(--body);color:var(--body);}

/* ── HISTORY DETAIL ── */
#screen-hist-detail{flex-direction:column;padding:32px 24px;overflow-y:auto;gap:16px;max-width:680px;margin:0 auto;}
.hd-case-tag{font-family:var(--mono);font-size:9px;letter-spacing:.4em;color:var(--red2);}
.hd-title{font-family:var(--display);font-size:clamp(28px,7vw,52px);font-weight:700;color:var(--bright);line-height:.9;margin-bottom:4px;}
.hd-setting{font-family:var(--serif);font-style:italic;font-size:15px;color:var(--muted);line-height:1.7;padding:16px;border:1px solid var(--line);background:var(--bg2);}
.hd-section{margin-top:4px;}
.hd-section-label{font-family:var(--mono);font-size:9px;letter-spacing:.4em;color:var(--dim);text-transform:uppercase;margin-bottom:10px;border-bottom:1px solid var(--line);padding-bottom:6px;}
.hd-story{font-family:var(--serif);font-size:16px;line-height:1.9;color:var(--body);}
.hd-clue-list{display:flex;flex-direction:column;gap:6px;}
.hd-clue{font-family:var(--mono);font-size:11px;color:var(--teal2);padding:6px 10px;border-left:2px solid var(--teal);background:rgba(34,168,144,.04);}
.hd-stats{display:flex;gap:24px;flex-wrap:wrap;}
.hd-stat{text-align:center;}
.hd-stat-n{font-family:var(--display);font-size:32px;color:var(--amber);display:block;}
.hd-stat-l{font-family:var(--mono);font-size:9px;letter-spacing:.25em;color:var(--muted);}

/* ── GAME SCREEN ── */
#screen-game{flex-direction:column;height:100%;overflow:hidden;}
.topbar{display:flex;align-items:center;padding:9px 14px;border-bottom:1px solid var(--line);flex-shrink:0;gap:10px;}
.case-tag{font-family:var(--mono);font-size:9px;letter-spacing:.3em;color:var(--red2);white-space:nowrap;animation:pulse 4s infinite;flex-shrink:0;}
.case-title{font-family:var(--display);font-style:italic;font-size:14px;color:var(--bright);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;}
.topbar-stats{display:flex;gap:14px;flex-shrink:0;}
.tstat{font-family:var(--mono);font-size:9px;color:var(--muted);white-space:nowrap;}
.tstat b{color:var(--amber);font-weight:normal;}
.mob-btn{display:none;font-family:var(--mono);font-size:9px;letter-spacing:.2em;padding:5px 11px;background:transparent;border:1px solid var(--line);color:var(--muted);cursor:pointer;flex-shrink:0;transition:all .2s;}
.mob-btn:hover{border-color:var(--amber);color:var(--amber);}

.game-body{display:flex;flex:1;min-height:0;overflow:hidden;}

/* Story col */
.story-col{flex:1;display:flex;flex-direction:column;min-width:0;border-right:1px solid var(--line);}
.story-feed{flex:1;overflow-y:auto;padding:18px 16px;scroll-behavior:smooth;}
.story-feed::-webkit-scrollbar{width:3px;}
.story-feed::-webkit-scrollbar-thumb{background:var(--line);}
.msg{margin-bottom:18px;animation:min .3s ease;}
@keyframes min{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
.msg-tag{font-family:var(--mono);font-size:8px;letter-spacing:.3em;text-transform:uppercase;margin-bottom:5px;}
.msg-tag.gm{color:var(--red2)}.msg-tag.player{color:var(--amber)}.msg-tag.system{color:var(--dim)}.msg-tag.clue{color:var(--teal2)}.msg-tag.item{color:var(--blue2)}
.msg-body{font-family:var(--serif);font-size:15px;line-height:1.85;padding-left:11px;border-left:2px solid transparent;}
.msg-body.gm{border-color:var(--red);color:var(--bright);}
.msg-body.player{border-color:var(--amber);color:var(--muted);font-style:italic;}
.msg-body.system{color:var(--dim);font-size:12px;font-style:italic;}
.msg-body.clue{border-color:var(--teal);color:var(--teal2);font-size:12px;font-family:var(--mono);letter-spacing:.04em;}
.msg-body.item{border-color:var(--blue2);color:var(--blue2);font-size:12px;font-family:var(--mono);}
.divider{text-align:center;color:var(--line);font-size:10px;margin:2px 0 18px;letter-spacing:.4em;}

/* Typing */
.typing-row{display:none;align-items:center;gap:7px;padding:8px 16px;flex-shrink:0;}
.typing-row.on{display:flex;}
.td{width:5px;height:5px;background:var(--red);border-radius:50%;animation:td 1.2s infinite;}
.td:nth-child(2){animation-delay:.2s}.td:nth-child(3){animation-delay:.4s}
@keyframes td{0%,80%,100%{transform:scale(.55);opacity:.25}40%{transform:scale(1);opacity:1}}
.typing-lbl{font-family:var(--mono);font-size:9px;color:var(--red);letter-spacing:.2em;animation:pulse 1s infinite;}

/* Input */
.input-zone{border-top:1px solid var(--line);padding:10px 14px;flex-shrink:0;background:var(--bg2);}
.input-row{display:flex;gap:8px;align-items:flex-end;}
#msg-input{flex:1;background:transparent;border:none;border-bottom:1px solid var(--line);color:var(--bright);font-family:var(--serif);font-size:16px;padding:7px 4px;outline:none;resize:none;min-height:36px;max-height:90px;line-height:1.5;transition:border-color .2s;}
#msg-input:focus{border-bottom-color:var(--amber);}
#msg-input::placeholder{color:var(--dim);font-style:italic;}
.send-btn{font-family:var(--mono);font-size:10px;letter-spacing:.2em;padding:8px 16px;background:var(--amber);color:var(--bg);border:none;cursor:pointer;transition:all .2s;flex-shrink:0;font-weight:bold;}
.send-btn:hover{background:var(--amber2);}
.send-btn:disabled{background:var(--dim);cursor:not-allowed;color:var(--bg3);}
.quick-row{display:flex;gap:5px;margin-top:8px;overflow-x:auto;padding-bottom:2px;-webkit-overflow-scrolling:touch;}
.quick-row::-webkit-scrollbar{display:none}
.qbtn{font-family:var(--mono);font-size:9px;letter-spacing:.08em;padding:5px 12px;background:transparent;border:1px solid var(--line);color:var(--muted);cursor:pointer;white-space:nowrap;flex-shrink:0;transition:all .15s;}
.qbtn:hover{border-color:var(--amber);color:var(--amber);}
.qbtn.red{border-color:rgba(176,48,32,.4);color:rgba(212,64,48,.8);}
.qbtn.red:hover{border-color:var(--red2);color:var(--red2);}

/* ── SIDEBAR ── */
.sidebar{width:232px;flex-shrink:0;display:flex;flex-direction:column;overflow:hidden;background:var(--bg2);}

/* Tab bar */
.sb-tabs{display:flex;border-bottom:1px solid var(--line);flex-shrink:0;}
.sb-tab{flex:1;font-family:var(--mono);font-size:8px;letter-spacing:.2em;text-transform:uppercase;padding:9px 4px;background:transparent;border:none;color:var(--muted);cursor:pointer;transition:all .2s;border-bottom:2px solid transparent;}
.sb-tab:hover{color:var(--body);}
.sb-tab.active{color:var(--bright);border-bottom-color:var(--amber);}

/* Tab panels */
.sb-panel{display:none;flex:1;flex-direction:column;overflow:hidden;}
.sb-panel.active{display:flex;}

/* Clue journal */
.journal-section{flex-shrink:0;}
.journal-sec-label{font-family:var(--mono);font-size:8px;letter-spacing:.35em;text-transform:uppercase;color:var(--dim);padding:10px 12px 6px;display:flex;align-items:center;justify-content:space-between;}
.journal-sec-label span{color:var(--teal2);font-size:8px;}
.clue-list{overflow-y:auto;flex:1;padding:4px 12px 10px;}
.clue-list::-webkit-scrollbar{width:2px;}
.clue-list::-webkit-scrollbar-thumb{background:var(--line);}
.clue-item{display:flex;align-items:flex-start;gap:7px;margin-bottom:8px;animation:min .3s;}
.clue-n{font-family:var(--mono);font-size:8px;color:var(--teal2);flex-shrink:0;margin-top:3px;}
.clue-t{font-family:var(--serif);font-size:12px;color:var(--body);line-height:1.45;}
.note-list{padding:4px 12px 8px;}
.note-item{margin-bottom:6px;padding:7px 9px;background:rgba(200,144,16,.05);border-left:2px solid var(--amber);font-family:var(--serif);font-size:12px;color:var(--body);line-height:1.4;animation:min .3s;position:relative;}
.note-del{position:absolute;top:5px;right:6px;background:transparent;border:none;color:var(--dim);cursor:pointer;font-size:11px;line-height:1;}
.note-del:hover{color:var(--red2);}
.note-input-row{display:flex;gap:6px;padding:8px 12px;border-top:1px solid var(--line);flex-shrink:0;}
.note-input{flex:1;background:transparent;border:1px solid var(--line);color:var(--bright);font-family:var(--serif);font-size:12px;padding:6px 8px;outline:none;resize:none;min-height:32px;line-height:1.4;}
.note-input:focus{border-color:var(--amber);}
.note-input::placeholder{color:var(--dim);font-style:italic;font-size:11px;}
.note-add{font-family:var(--mono);font-size:9px;padding:6px 10px;background:rgba(200,144,16,.15);border:1px solid var(--amber);color:var(--amber);cursor:pointer;flex-shrink:0;transition:all .2s;}
.note-add:hover{background:rgba(200,144,16,.25);}
.empty-hint{font-family:var(--serif);font-style:italic;font-size:12px;color:var(--dim);padding:10px 12px;}

/* Inventory */
.inv-grid{display:flex;flex-direction:column;gap:4px;padding:10px 12px;overflow-y:auto;flex:1;}
.inv-grid::-webkit-scrollbar{width:2px;}
.inv-grid::-webkit-scrollbar-thumb{background:var(--line);}
.inv-item{display:flex;align-items:flex-start;gap:10px;padding:9px 10px;border:1px solid var(--line);background:transparent;cursor:pointer;transition:all .2s;text-align:left;animation:min .3s;}
.inv-item:hover{border-color:var(--blue2);background:rgba(48,112,192,.05);}
.inv-icon{font-size:16px;flex-shrink:0;margin-top:1px;}
.inv-name{font-family:var(--serif);font-size:13px;color:var(--body);display:block;margin-bottom:2px;}
.inv-loc{font-family:var(--mono);font-size:9px;color:var(--muted);letter-spacing:.08em;}
.inv-new{width:6px;height:6px;border-radius:50%;background:var(--blue2);flex-shrink:0;margin-top:6px;box-shadow:0 0 6px var(--blue2);}

/* Character files */
.char-list{overflow-y:auto;flex:1;padding:8px 12px;}
.char-list::-webkit-scrollbar{width:2px;}
.char-list::-webkit-scrollbar-thumb{background:var(--line);}
.char-card{border:1px solid var(--line);margin-bottom:8px;cursor:pointer;transition:all .2s;animation:min .3s;}
.char-card:hover{border-color:var(--dim);}
.char-card-head{display:flex;align-items:center;justify-content:space-between;padding:8px 10px;background:var(--bg3);}
.char-name{font-family:var(--serif);font-size:14px;color:var(--bright);}
.char-role{font-family:var(--mono);font-size:8px;color:var(--muted);letter-spacing:.1em;}
.char-sus-wrap{width:44px;height:3px;background:var(--line);border-radius:2px;overflow:hidden;}
.char-sus{height:100%;background:var(--red);transition:width .5s;box-shadow:0 0 5px var(--red);}
.char-body{padding:8px 10px;display:none;}
.char-body.open{display:block;}
.char-field{margin-bottom:6px;}
.char-field-l{font-family:var(--mono);font-size:8px;letter-spacing:.2em;color:var(--dim);text-transform:uppercase;margin-bottom:2px;}
.char-field-v{font-family:var(--serif);font-size:12px;color:var(--body);line-height:1.4;}
.char-field-v.unknown{color:var(--dim);font-style:italic;}

/* Scenes (in scene panel) */
.scene-panel-list{display:flex;flex-direction:column;gap:3px;padding:10px 12px;overflow-y:auto;flex:1;}
.scene-btn{font-family:var(--serif);font-size:13px;text-align:left;padding:8px 10px;background:transparent;border:1px solid transparent;color:var(--muted);cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:8px;width:100%;}
.scene-btn:hover{border-color:var(--line);color:var(--body);}
.scene-btn.active{border-color:var(--amber);color:var(--amber);background:rgba(200,144,16,.04);}
.sdot{width:6px;height:6px;border-radius:50%;background:var(--line);flex-shrink:0;transition:background .15s;}
.scene-btn.active .sdot{background:var(--amber);box-shadow:0 0 5px var(--amber);}
.scene-btn.visited .sdot{background:var(--teal);}
.scene-pct{font-family:var(--mono);font-size:8px;color:var(--muted);margin-left:auto;}

/* Bottom accuse */
.accuse-zone{padding:12px;border-top:1px solid var(--line);flex-shrink:0;}
.accuse-btn{width:100%;font-family:var(--mono);font-size:9px;letter-spacing:.25em;text-transform:uppercase;padding:10px;background:transparent;border:1px solid var(--red);color:var(--red);cursor:pointer;transition:all .2s;}
.accuse-btn:hover{background:rgba(176,48,32,.1);}

/* ── ITEM DETAIL PANEL (replaces modal) ── */
.item-detail-panel{display:none;flex-direction:column;flex:1;overflow:hidden;}
.item-detail-panel.open{display:flex;}
.item-detail-back{font-family:var(--mono);font-size:9px;letter-spacing:.25em;padding:10px 14px;background:transparent;border:none;border-bottom:1px solid var(--line);color:var(--muted);cursor:pointer;text-align:left;transition:color .2s;flex-shrink:0;}
.item-detail-back:hover{color:var(--amber);}
.item-detail-back::before{content:'← ';opacity:.6;}
.item-detail-body{padding:16px 14px;overflow-y:auto;flex:1;}
.item-detail-body::-webkit-scrollbar{width:2px;}
.item-detail-body::-webkit-scrollbar-thumb{background:var(--line);}
.item-detail-icon{font-size:32px;margin-bottom:12px;display:block;}
.item-detail-name{font-family:var(--display);font-size:18px;color:var(--bright);margin-bottom:4px;}
.item-detail-loc{font-family:var(--mono);font-size:9px;letter-spacing:.2em;color:var(--blue2);text-transform:uppercase;margin-bottom:14px;}
.item-detail-desc{font-family:var(--serif);font-size:14px;line-height:1.85;color:var(--body);margin-bottom:16px;}
.item-detail-analysis{padding:12px;background:rgba(32,72,120,.08);border-left:2px solid var(--blue2);}
.item-detail-analysis-label{font-family:var(--mono);font-size:8px;letter-spacing:.3em;color:var(--blue2);margin-bottom:6px;text-transform:uppercase;}
.item-detail-analysis-text{font-family:var(--serif);font-style:italic;font-size:13px;color:var(--body);line-height:1.6;}

/* ── ACCUSE SCREEN ── */
#screen-accuse{flex-direction:column;align-items:center;justify-content:center;padding:32px 24px;gap:18px;}
.acc-title{font-family:var(--display);font-size:clamp(22px,5vw,34px);color:var(--bright);text-align:center;}
.acc-sub{font-family:var(--serif);font-style:italic;font-size:14px;color:var(--muted);text-align:center;max-width:400px;line-height:1.7;}
.susp-cards{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;max-width:500px;}
.susp-card{font-family:var(--serif);font-size:14px;padding:14px 20px;border:1px solid var(--line);color:var(--body);background:var(--bg2);cursor:pointer;transition:all .2s;text-align:center;min-width:120px;}
.susp-card:hover{border-color:var(--red2);color:var(--bright);background:rgba(176,48,32,.08);transform:translateY(-2px);}
.btn-back{font-family:var(--mono);font-size:9px;letter-spacing:.3em;padding:9px 22px;background:transparent;border:1px solid var(--line);color:var(--muted);cursor:pointer;transition:all .2s;}
.btn-back:hover{border-color:var(--body);color:var(--body);}

/* ── RESULT ── */
#screen-result{flex-direction:column;align-items:center;justify-content:center;padding:36px 24px;gap:18px;text-align:center;overflow-y:auto;}
.res-verdict{font-family:var(--mono);font-size:10px;letter-spacing:.5em;text-transform:uppercase;}
.res-verdict.win{color:var(--teal2)}.res-verdict.lose{color:var(--red2);}
.res-title{font-family:var(--display);font-size:clamp(34px,10vw,70px);font-weight:700;line-height:.9;}
.res-title.win{color:var(--bright)}.res-title.lose{color:var(--red2);}
.res-story{font-family:var(--serif);font-style:italic;font-size:clamp(14px,2vw,16px);color:var(--body);max-width:500px;line-height:1.85;padding:20px;border:1px solid var(--line);background:var(--bg2);text-align:left;}
.res-stats{display:flex;gap:28px;}
.rs-n{font-family:var(--display);font-size:34px;color:var(--amber);display:block;}
.rs-l{font-family:var(--mono);font-size:8px;letter-spacing:.3em;color:var(--muted);text-transform:uppercase;}
.res-actions{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;}
.btn-p{font-family:var(--mono);font-size:10px;letter-spacing:.3em;padding:13px 32px;background:var(--red);border:none;color:#fff;cursor:pointer;transition:all .2s;}
.btn-p:hover{background:var(--red2);transform:translateY(-1px);}
.btn-s{font-family:var(--mono);font-size:10px;letter-spacing:.3em;padding:13px 32px;background:transparent;border:1px solid var(--line);color:var(--muted);cursor:pointer;transition:all .2s;}
.btn-s:hover{border-color:var(--body);color:var(--body);}

/* ── MOBILE DRAWER ── */
#mob-drawer{display:none;position:fixed;inset:0;z-index:200;}
#mob-drawer.on{display:block;}
.drawer-back{position:absolute;inset:0;background:rgba(0,0,0,.75);}
.drawer-panel{position:absolute;right:0;top:0;bottom:0;width:268px;background:var(--bg2);border-left:1px solid var(--line);display:flex;flex-direction:column;overflow:hidden;}
.drawer-close{font-family:var(--mono);font-size:9px;letter-spacing:.3em;padding:12px 14px;background:transparent;border:none;border-bottom:1px solid var(--line);color:var(--muted);cursor:pointer;text-align:right;}

@media(max-width:640px){
  .sidebar{display:none;}
  .story-col{border-right:none;}
  #screen-title{padding:56px 20px 36px;justify-content:flex-start;overflow-y:auto;}
  .topbar-stats{display:none;}
  .mob-btn{display:block;}
  .msg-body{font-size:15px;}
}
@supports(padding:max(0px)){
  @media(max-width:640px){
    .quick-row{padding-bottom:max(2px,env(safe-area-inset-bottom));}
    #screen-title{padding-top:max(56px,calc(36px + env(safe-area-inset-top)));}
  }
}
</style>
</head>
<body>

<!-- ══ TITLE ══ -->
<div id="screen-title" class="screen active">

<div class="autosave-dot" id="autosave-dot"></div>

</div>

<!-- ══ HISTORY ══ -->

</div>

<div id="screen-hist-detail" class="screen">

    <div class="bgm-ctrl" id="bgm-ctrl">

  "key_items": [
    {"name":"物品名稱","icon":"🔍","location":"發現地點","desc":"物品描述","analysis":"鑑識意義"},
    {"name":"物品名稱","icon":"💊","location":"發現地點","desc":"物品描述","analysis":"鑑識意義"},
    {"name":"物品名稱","icon":"📄","location":"發現地點","desc":"物品描述","analysis":"鑑識意義"}
  ],
  "opening": "開場敘述（150字，偵探抵達現場，第一人稱，充滿壓迫感的恐怖氛圍，不透露任何解答）"
}`;
}

function buildGMPrompt() {
  const c = G.caseData;
  const dMap = {
    easy:'線索直接給出，每次調查有明顯收穫，嫌疑人較坦白',
    normal:'線索需要玩家主動發現，嫌疑人有隱瞞，偶爾加入誤導，保持懸疑張力',
    hard:'極度隱晦，大量誤導和干擾，嫌疑人都有秘密，需要非常精準的提問才能得到有用資訊'
  };

  return `你是恐怖推理劇本殺的GM（遊戲主持人）。

【案件資料】
標題：${c.title}
背景：${c.era}，${c.setting}
受害者：${c.victim.name}（${c.victim.age}歲，${c.victim.role}）
死亡方式：${c.cause_of_death}
死亡時間：${c.time_of_death}
真兇：${c.killer}——絕對不可以直接透露
真實動機：${c.real_motive}
作案手法：${c.method}

嫌疑人：
${c.suspects.map(s=>`• ${s.name}（${s.role}）：${s.relation}，自稱不在場：${s.alibi}`).join('\n')}

關鍵線索（依場景調查逐步揭露）：
${c.key_clues.map((k,i)=>`${i+1}. [${k.location}] ${k.clue}`).join('\n')}

誤導線索（適時加入）：${c.red_herrings.join('；')}
${G.diff==='hard'?'干擾線索（主動加入迷惑玩家）：'+c.noise_clues.join('；'):''}

關鍵物品（玩家在對應場景調查時出現）：
${c.key_items.map(i=>`• ${i.name}（位於${i.location}）`).join('\n')}

【GM規則】
1. 繁體中文，語氣沉重有文學性，充滿恐怖懸疑氛圍
2. 每次回應100-200字，具體描述感官細節
3. 難度處理：${dMap[G.diff]}
4. 嫌疑人對話要有各自個性和情緒，反應要符合他們的心理狀態
5. 發現線索：末尾加【✦線索：具體線索內容】
6. 發現物品：末尾加【📦物品：物品名稱|發現地點|物品描述】
7. 嫌疑值更新：加【▲:姓名】升高或【▼:姓名】降低
8. 人物新資訊：加【👤:姓名|欄位名稱|內容】（例如：動機、秘密、行蹤）
9. 永遠不直接說出兇手，讓玩家自己推理
10. 每次調查都要有新資訊或氛圍描述，不要讓玩家白跑`;
}

// API

async function callAPI(messages, system, maxTok=1400) {
  const url = WORKER_URL || "https://api.anthropic.com/v1/messages";
  const h = {"Content-Type":"application/json"};
  if (!WORKER_URL) {
    h["x-api-key"] = G.apiKey;
    h["anthropic-version"] = "2023-06-01";
    h["anthropic-dangerous-direct-browser-access"] = "true";
  }
  const r = await fetch(url, {method:"POST", headers:h, body:JSON.stringify({
    model:"claude-sonnet-4-20250514", max_tokens:maxTok, system, messages
  })});
  const d = await r.json();
  if (!r.ok) throw new Error(d?.error?.message || `HTTP ${r.status}`);
  return d.content?.map(b=>b.text||'').join('') || '';
}

async function initGame() {
  if (!WORKER_URL) {
    const k = prompt('請輸入 Anthropic API Key（sk-ant-...）\n\n取得：console.anthropic.com');
    if (!k || !k.startsWith('sk-ant-')) { alert('API Key 格式不正確'); return; }
    G.apiKey = k;
  }
  document.getElementById('enter-btn').disabled = true;
  showScreen('screen-loading');
  await genCase();
}

async function genCase() {
  const logs = ['解析犯罪現場…','建立嫌疑人檔案…','埋設實物線索…','核對犯罪時間線…','生成案件報告…'];
  let pct = 0;
  const bar = document.getElementById('ld-bar');
  const log = document.getElementById('ld-log');
  const t = setInterval(()=>{ pct=Math.min(pct+2,88); bar.style.width=pct+'%'; log.textContent=logs[Math.min(Math.floor(pct/20),4)]; }, 90);

  try {
    const raw = await callAPI([{role:'user',content:'請生成新案件'}], buildGenPrompt(G.diff), 1800);
    clearInterval(t); bar.style.width='100%'; log.textContent='案件就緒…';

    const json = raw.replace(/```json|```/g,'').trim();
    G.caseData = JSON.parse(json);

    // Reset state
    G.history=[]; G.clues=[]; G.notes=[]; G.items=[]; G.turns=0; G.gameOver=false;
    G.sceneVisitCount={};
    G.scenes = G.caseData.scenes.map((s,i)=>({...s, visited:i===0, clue_pct:0}));
    G.currentScene = G.caseData.scenes[0].name;

    // Build chars from suspects + victim
    G.chars = G.caseData.suspects.map(s=>({
      name:s.name, role:s.role, age:s.age, sus:20,
      known:{ '身份':s.role, '年齡':s.age+'歲', '與受害者關係':s.relation, '外貌特徵':s.known },
      unknown:{ '真實動機':'？？？', '案發當晚行蹤':'？？？', '秘密':'？？？' },
      open:false
    }));
    // Add victim
    const v = G.caseData.victim;
    G.chars.unshift({
      name:v.name, role:v.role+'（受害者）', age:v.age,
      isVictim:true, sus:0, open:false,
      known:{ '身份':v.role, '年齡':v.age+'歲', '外貌':v.desc, '死因':G.caseData.cause_of_death, '死亡時間':G.caseData.time_of_death },
      unknown:{ '死前行動':'？？？', '遺留物品':'？？？' }
    });

    await new Promise(r=>setTimeout(r,350));
    startUI();
  } catch(e) {
    clearInterval(t);
    log.textContent = '錯誤：'+e.message;
    setTimeout(()=>{ document.getElementById('enter-btn').disabled=false; showScreen('screen-title'); }, 3500);
  }
}

function startUI() {
  showScreen('screen-game');
  document.getElementById('case-title').textContent = G.caseData.title;
  document.getElementById('st-s').textContent = G.currentScene;
  document.getElementById('story-feed').innerHTML = '';
  renderAll(); renderQuick();
  addMsg('gm','[ 案發現場 ]', G.caseData.opening);
  updStats(); saveGame();
  BGM.startForCase(G.caseData);
}

async function sendMsg() {
  if (G.gameOver) return;
  const inp = document.getElementById('msg-input');
  const txt = inp.value.trim(); if (!txt) return;
  inp.value=''; inp.style.height='auto';
  document.getElementById('send-btn').disabled = true;
  addDiv(); addMsg('player','[ 偵探 ]',txt);
  setTyping(true);
  try {
    G.history.push({role:'user', content:`[場景：${G.currentScene}] ${txt}`});
    const reply = await callAPI(G.history, buildGMPrompt());
    G.history.push({role:'assistant', content:reply});
    setTyping(false);
    const clean = parseReply(reply);
    addMsg('gm','[ 現場 ]',clean);
    G.turns++; updStats(); saveGame();
  } catch(e) {
    setTyping(false); addMsg('system','[ 系統 ]','訊號干擾：'+e.message);
  }
  document.getElementById('send-btn').disabled = false;
}

function parseReply(txt) {
  // Clues
  [...txt.matchAll(/【[✦★]線索：([^】]+)】/g)].forEach(m=>{
    const c=m[1].trim();
    if(!G.clues.includes(c)){G.clues.push(c);addMsg('clue','✦ 新線索',c);renderClues();}
  });

  // Items
  [...txt.matchAll(/【📦物品：([^|】]+)\|([^|】]+)\|([^】]+)】/g)].forEach(m=>{
    const name=m[1].trim(), loc=m[2].trim(), desc=m[3].trim();
    if(!G.items.find(i=>i.name===name)){
      // Find matching key_item for analysis
      const ki = G.caseData.key_items?.find(k=>k.name===name||name.includes(k.name));
      G.items.push({name, loc, desc, analysis:ki?.analysis||'', icon:ki?.icon||'🔍', isNew:true});
      addMsg('item','📦 發現物品',`${name}（${loc}）`);
      renderInv();
    }
  });

  // Suspicion
  [...txt.matchAll(/【▲:([^】]+)】/g)].forEach(m=>{
    const s=G.chars.find(c=>c.name===m[1].trim()&&!c.isVictim);
    if(s){s.sus=Math.min(100,s.sus+18);renderChars();}
  });
  [...txt.matchAll(/【▼:([^】]+)】/g)].forEach(m=>{
    const s=G.chars.find(c=>c.name===m[1].trim()&&!c.isVictim);
    if(s){s.sus=Math.max(0,s.sus-12);renderChars();}
  });

  // Char updates
  [...txt.matchAll(/【👤:([^|】]+)\|([^|】]+)\|([^】]+)】/g)].forEach(m=>{
    const ch=G.chars.find(c=>c.name===m[1].trim());
    if(ch){
      const field=m[2].trim(), val=m[3].trim();
      if(ch.unknown[field]!==undefined) delete ch.unknown[field];
      ch.known[field]=val;
      renderChars();
    }
  });

  // Update scene exploration
  const sc=G.scenes.find(s=>s.name===G.currentScene);
  if(sc){ sc.clue_pct=Math.min(100,sc.clue_pct+15); renderScenes(); }

  return txt
    .replace(/【[✦★]線索：[^】]+】/g,'')
    .replace(/【📦物品：[^】]+】/g,'')
    .replace(/【[▲▼]:[^】]+】/g,'')
    .replace(/【👤:[^】]+】/g,'')
    .trim();
}

async function goScene(name) {
  if (G.gameOver || name===G.currentScene) return;
  G.currentScene=name;
  const sc=G.scenes.find(s=>s.name===name); if(sc) sc.visited=true;
  document.getElementById('st-s').textContent=name;
  BGM.transitionTo(name, G.caseData);
  renderScenes(); addDiv(); addMsg('system','[ 移動 ]',`前往 → ${name}`);
  setTyping(true); document.getElementById('send-btn').disabled=true;
  try {
    G.history.push({role:'user', content:`我走進了【${name}】，環顧四周，觀察現場。`});
    const reply=await callAPI(G.history, buildGMPrompt());
    G.history.push({role:'assistant', content:reply});
    setTyping(false);
    addMsg('gm',`[ ${name} ]`, parseReply(reply));
    G.turns++; updStats(); renderQuick(); saveGame();
  } catch(e) {
    setTyping(false); addMsg('system','[ 系統 ]','移動失敗：'+e.message);
  }
  document.getElementById('send-btn').disabled=false;
  closeDrawer();
}

async function accuse(name) {
  G.gameOver=true;
  const win = name===G.caseData.killer;
  showScreen('screen-loading');
  document.getElementById('ld-log').textContent='計算結果…';
  document.getElementById('ld-bar').style.width='55%';
  try {
    const p = win
      ? `玩家正確指認了兇手${name}。請揭露完整犯罪真相，包括犯罪過程、動機細節和最終結局（180-220字，戲劇性、有滿足感，符合案件邏輯）。`
      : `玩家錯誤指認了${name}，真兇${G.caseData.killer}逍遙法外。描述錯誤指認的悲劇後果，和真兇的逃脫（120-160字，帶有絕望和恐怖感）。`;
    const ending = await callAPI([{role:'user',content:p}], buildGMPrompt());

function finishGame(win, accused, story) {
  // Clear autosave — game is done
  localStorage.removeItem(SAVE_KEY);
  document.getElementById('resume-banner').classList.remove('show');
  // Save to history
  const record = {
    id: Date.now(),
    title: G.caseData.title,
    era: G.caseData.era,
    setting: G.caseData.setting,
    victim: G.caseData.victim.name,
    killer: G.caseData.killer,
    real_motive: G.caseData.real_motive,
    method: G.caseData.method,
    win, accused,
    clues: [...G.clues],
    notes: [...G.notes],
    turns: G.turns,
    story,
    date: new Date().toLocaleDateString('zh-TW')
  };
  const hist = JSON.parse(localStorage.getItem('darkroom_history')||'[]');
  hist.unshift(record);
  localStorage.setItem('darkroom_history', JSON.stringify(hist.slice(0,30)));

  document.getElementById('res-v').textContent = win?'案件告破':'調查失敗';
  document.getElementById('res-v').className = 'res-verdict '+(win?'win':'lose');
  document.getElementById('res-t').textContent = win?'真相大白':'迷失黑暗';
  document.getElementById('res-t').className = 'res-title '+(win?'win':'lose');
  document.getElementById('res-s').textContent = story;
  document.getElementById('rs-c').textContent = G.clues.length;
  document.getElementById('rs-t').textContent = G.turns;
  BGM.stop();
  showScreen('screen-result');
}

// AUTOSAVE / RESUME
// ══════════════════════════════════
const SAVE_KEY = 'darkroom_autosave';

function saveGame() {
  if (!G.caseData || G.gameOver) return;
  const snapshot = {
    diff: G.diff,
    apiKey: G.apiKey,
    caseData: G.caseData,
    history: G.history,
    clues: G.clues,
    notes: G.notes,
    items: G.items,
    chars: G.chars,
    scenes: G.scenes,
    currentScene: G.currentScene,
    turns: G.turns,
    // Save rendered story as text log so we can restore display
    storyLog: getStoryLog(),
    savedAt: Date.now()
  };
  try {
    localStorage.setItem(SAVE_KEY, JSON.stringify(snapshot));
    flashSaveIndicator();
  } catch(e) { /* storage full — silently skip */ }
}

function getStoryLog() {
  const feed = document.getElementById('story-feed');
  return [...feed.children].map(el => {
    if (el.classList.contains('divider')) return { type:'divider' };
    const tag = el.querySelector('.msg-tag');
    const body = el.querySelector('.msg-body');
    if (!tag || !body) return null;
    // Determine type from class
    const type = [...body.classList].find(c => c !== 'msg-body') || 'gm';
    return { type, tag: tag.textContent, text: body.textContent };
  }).filter(Boolean);
}

function flashSaveIndicator() {
  const dot = document.getElementById('autosave-dot');
  dot.classList.remove('saving');
  void dot.offsetWidth; // reflow to restart animation
  dot.classList.add('saving');
}

function checkResume() {
  try {
    const raw = localStorage.getItem(SAVE_KEY);
    if (!raw) return;
    const snap = JSON.parse(raw);
    if (!snap.caseData) return;
    const mins = Math.round((Date.now() - snap.savedAt) / 60000);
    const timeStr = mins < 60 ? `${mins} 分鐘前` : `${Math.round(mins/60)} 小時前`;
    document.getElementById('resume-title').textContent = snap.caseData.title;
    document.getElementById('resume-meta').textContent =
      `${snap.turns} 回合・${snap.clues.length} 條線索・${timeStr}中斷`;
    document.getElementById('resume-banner').classList.add('show');
  } catch(e) { /* corrupted save — ignore */ }
}

function resumeGame() {
  try {
    const snap = JSON.parse(localStorage.getItem(SAVE_KEY));
    if (!snap) return;

    // Restore state
    G.diff = snap.diff;
    G.apiKey = snap.apiKey || '';
    G.caseData = snap.caseData;
    G.history = snap.history;
    G.clues = snap.clues;
    G.notes = snap.notes;
    G.items = snap.items;
    G.chars = snap.chars;
    G.scenes = snap.scenes;
    G.currentScene = snap.currentScene;
    G.turns = snap.turns;
    G.gameOver = false;

    showScreen('screen-game');
    document.getElementById('case-title').textContent = G.caseData.title;
    document.getElementById('st-s').textContent = G.currentScene;

    // Restore story feed from log
    const feed = document.getElementById('story-feed');
    feed.innerHTML = '';
    (snap.storyLog || []).forEach(entry => {
      if (entry.type === 'divider') { addDiv(); return; }
      addMsg(entry.type, entry.tag, entry.text);
    });

    // Add resume notice
    addDiv();
    addMsg('system', '[ 系統 ]', '— 已從上次中斷處繼續 —');

    renderAll(); renderQuick(); updStats();
    BGM.startForCase(G.caseData);
  } catch(e) {
    alert('讀取存檔失敗：'+e.message);
  }
}

function discardSave() {
  if (!confirm('確定要放棄這個未完成的案件嗎？')) return;
  localStorage.removeItem(SAVE_KEY);
  document.getElementById('resume-banner').classList.remove('show');
}

// RENDER
// ══════════════════════════════════
function renderAll() { renderClues(); renderChars(); renderInv(); renderScenes(); }

function renderClues() {
  const empty = '<div class="empty-hint">尚未發現線索…</div>';
  ['clue-list-d','clue-list-m'].forEach(id=>{
    const el=document.getElementById(id); if(!el) return;
    el.innerHTML = G.clues.length===0 ? empty :
      G.clues.map((c,i)=>`<div class="clue-item"><div class="clue-n">${String(i+1).padStart(2,'0')}</div><div class="clue-t">${c}</div></div>`).join('');
  });
  document.querySelectorAll('#clue-count-d,#clue-count-m').forEach(el=>{ if(el) el.textContent=G.clues.length; });
}

function renderNotes() {
  const html = G.notes.map(n=>`<div class="note-item">${n.txt}<button class="note-del" onclick="delNote(${n.id})">✕</button></div>`).join('');
  ['note-list-d','note-list-m'].forEach(id=>{ const el=document.getElementById(id); if(el) el.innerHTML=html; });
  document.querySelectorAll('#note-count-d,#note-count-m').forEach(el=>{ if(el) el.textContent=G.notes.length; });
}

function renderChars() {
  const html = G.chars.map((c,ci)=>{
    const knownRows = Object.entries(c.known).map(([k,v])=>`<div class="char-field"><div class="char-field-l">${k}</div><div class="char-field-v">${v}</div></div>`).join('');
    const unknownRows = Object.entries(c.unknown).map(([k,v])=>`<div class="char-field"><div class="char-field-l">${k}</div><div class="char-field-v unknown">${v}</div></div>`).join('');
    return `
      <div class="char-card" id="cc-${ci}">
        <div class="char-card-head" onclick="toggleChar(${ci})">
          <div>
            <div class="char-name">${c.name}${c.isVictim?' ✝':''}</div>
            <div class="char-role">${c.role}</div>
          </div>
          ${!c.isVictim?`<div class="char-sus-wrap"><div class="char-sus" style="width:${c.sus}%"></div></div>`:''}
        </div>
        <div class="char-body ${c.open?'open':''}">
          ${knownRows}${unknownRows}
        </div>
      </div>`;
  }).join('');
  ['char-list-d','char-list-m'].forEach(id=>{ const el=document.getElementById(id); if(el) el.innerHTML=html; });
}

function toggleChar(ci) {
  G.chars[ci].open = !G.chars[ci].open;
  renderChars();
}

function renderInv() {
  const empty='<div class="empty-hint">尚未發現物品…</div>';
  const html = G.items.length===0 ? empty :
    G.items.map(i=>`
      <button class="inv-item" onclick="openItemDetail('${i.name}')">
        <div class="inv-icon">${i.icon}</div>
        <div style="flex:1;min-width:0">
          <span class="inv-name">${i.name}</span>
          <span class="inv-loc">${i.loc}</span>
        </div>
        ${i.isNew?'<div class="inv-new"></div>':''}
      </button>`).join('');
  ['inv-grid-d','inv-grid-m'].forEach(id=>{ const el=document.getElementById(id); if(el) el.innerHTML=html; });
}

function renderScenes() {
  ['scene-list-d','scene-list-m'].forEach(id=>{
    const el=document.getElementById(id); if(!el) return;
    el.innerHTML = G.scenes.map(s=>`
      <button class="scene-btn ${s.name===G.currentScene?'active':''} ${s.visited?'visited':''}" onclick="goScene('${s.name}')">
        <span class="sdot"></span>${s.name}
        <span class="scene-pct">${s.visited?(s.clue_pct+'%'):''}</span>
      </button>`).join('');
  });
}

function renderQuick() {
  const suspects = G.chars.filter(c=>!c.isVictim);
  const actions = ['環顧四周','仔細搜查','查看遺體',...suspects.map(s=>`詢問${s.name}`),'尋找隱藏物品'];
  document.getElementById('quick-row').innerHTML =
    actions.map(a=>`<button class="qbtn" onclick="quickAct('${a}')">${a}</button>`).join('')
    + `<button class="qbtn red" onclick="showAccuse()">▸ 指認</button>`;
}

// ══════════════════════════════════
// BGM ENGINE (Web Audio API)
// ══════════════════════════════════
const BGM = (() => {
  let ctx = null, masterGain = null, currentNodes = [], vol = 0.35;
  let playing = false, currentPreset = null, fadeTimer = null;

  // ── Preset definitions ──────────────────────────────────────
  // Each preset is a function that builds a layered soundscape
  // via oscillators + noise + filters. Fully generative, no files.
  const PRESETS = {

    // Dark, oppressive — crime scenes, indoor murder locations
    crime_scene: {
      label: '犯罪現場',
      build(g) {
        // Low drone
        drone(g, 38, 'sine', 0.18, { detune: -8 });
        drone(g, 40, 'sine', 0.10, { detune: 5, lfo: { rate: 0.07, depth: 4 } });
        // Sub rumble
        drone(g, 22, 'sine', 0.22);
        // High tension strings sim
        tremolo(g, 180, 'sawtooth', 0.04, 6);
        tremolo(g, 182, 'sawtooth', 0.03, 6.1);
        // Filtered noise — room ambience
        noise(g, 0.06, { freq: 300, Q: 0.8 });
        // Occasional creak
        pulse(g, 480, 'sine', 0.025, { interval: 7000, jitter: 4000 });
      }
    },

    // Hospital / clinical — sterile horror
    hospital: {
      label: '醫院走廊',
      build(g) {
        drone(g, 60, 'sine', 0.15, { lfo: { rate: 0.05, depth: 3 } });
        drone(g, 120, 'sine', 0.07);
        // Fluorescent hum
        drone(g, 120, 'sawtooth', 0.03, { detune: 12 });
        drone(g, 240, 'sawtooth', 0.015, { detune: -6 });
        // Distant beep
        pulse(g, 880, 'sine', 0.04, { interval: 4200, jitter: 800, duration: 120 });
        noise(g, 0.04, { freq: 2000, Q: 2 });
      }
    },

    // Outdoor night — woods, alley, street
    night_outdoor: {
      label: '深夜室外',
      build(g) {
        noise(g, 0.07, { freq: 600, Q: 0.5 }); // wind
        noise(g, 0.04, { freq: 150, Q: 1 });    // low wind
        drone(g, 55, 'sine', 0.10, { lfo: { rate: 0.12, depth: 6 } });
        // Crickets sim
        pulse(g, 3200, 'sine', 0.015, { interval: 180, jitter: 60, duration: 30 });
        pulse(g, 3400, 'sine', 0.012, { interval: 200, jitter: 80, duration: 25 });
        // Distant owl
        pulse(g, 280, 'sine', 0.03, { interval: 9000, jitter: 5000, duration: 400 });
      }
    },

    // Basement / underground — pressure, isolation
    basement: {
      label: '地下室',
      build(g) {
        drone(g, 28, 'sine', 0.28);
        drone(g, 56, 'sine', 0.12, { detune: -4 });
        noise(g, 0.09, { freq: 80, Q: 2 });     // pipe rumble
        noise(g, 0.03, { freq: 500, Q: 0.6 });
        // Drip
        pulse(g, 1200, 'sine', 0.03, { interval: 3100, jitter: 900, duration: 60 });
        pulse(g, 900,  'sine', 0.02, { interval: 5500, jitter: 2000, duration: 80 });
        tremolo(g, 44, 'sawtooth', 0.06, 3.3);
      }
    },

    // Study / library / office — psychological tension
    study: {
      label: '書房',
      build(g) {
        drone(g, 50, 'sine', 0.10);
        drone(g, 100, 'sine', 0.06, { lfo: { rate: 0.04, depth: 2 } });
        noise(g, 0.025, { freq: 4000, Q: 1 }); // paper/air
        // Clock tick
        pulse(g, 900, 'sine', 0.045, { interval: 1000, jitter: 0, duration: 25 });
        pulse(g, 700, 'sine', 0.025, { interval: 1000, jitter: 0, duration: 20, offset: 500 });
        tremolo(g, 160, 'triangle', 0.025, 4.5);
      }
    },

    // Confrontation / accuse — rising tension
    confrontation: {
      label: '對峙',
      build(g) {
        drone(g, 40, 'sawtooth', 0.09, { detune: 2 });
        drone(g, 40, 'sawtooth', 0.09, { detune: -2 });
        drone(g, 80, 'square',   0.05);
        tremolo(g, 160, 'sawtooth', 0.06, 8);
        tremolo(g, 320, 'sawtooth', 0.03, 8.1);
        noise(g, 0.07, { freq: 200, Q: 1 });
        noise(g, 0.04, { freq: 1200, Q: 1.5 });
        pulse(g, 55, 'sine', 0.15, { interval: 600, jitter: 100, duration: 300 });
      }
    },

    // Default — generic horror ambience
    default: {
      label: '黑暗氛圍',
      build(g) {
        drone(g, 36, 'sine', 0.18);
        drone(g, 72, 'sine', 0.08, { lfo: { rate: 0.06, depth: 5 } });
        noise(g, 0.05, { freq: 400, Q: 0.7 });
        tremolo(g, 144, 'sawtooth', 0.03, 5);
        pulse(g, 600, 'sine', 0.02, { interval: 6000, jitter: 3000, duration: 200 });
      }
    }
  };

  // ── Scene → preset mapping ───────────────────────────────────
  const SCENE_KEYWORDS = [
    { keys:['醫院','病房','手術','診所','護士','藥'],        preset:'hospital' },
    { keys:['地下','地窖','倉庫','車庫','停車'],              preset:'basement' },
    { keys:['書房','辦公','圖書','研究','檔案','閱覽'],        preset:'study' },
    { keys:['戶外','庭院','後院','巷','街','公園','屋頂','樓頂'], preset:'night_outdoor' },
    { keys:['案發','現場','臥室','客廳','廚房','浴室','走廊'], preset:'crime_scene' },
  ];

  function pickPreset(sceneName, caseData) {
    const name = sceneName || '';
    // Check scene name
    for (const { keys, preset } of SCENE_KEYWORDS) {
      if (keys.some(k => name.includes(k))) return preset;
    }
    // Check case setting for overall mood
    const setting = (caseData?.setting || '') + (caseData?.era || '');
    if (/醫院|診所|病院/.test(setting)) return 'hospital';
    if (/地下|倉庫|工廠/.test(setting)) return 'basement';
    if (/室外|戶外|森林|公園/.test(setting)) return 'night_outdoor';
    return 'crime_scene';
  }

  // ── Audio helpers ────────────────────────────────────────────
  function init() {
    if (ctx) return;
    ctx = new (window.AudioContext || window.webkitAudioContext)();
    masterGain = ctx.createGain();
    masterGain.gain.setValueAtTime(0, ctx.currentTime);
    masterGain.connect(ctx.destination);
  }

  function drone(parent, freq, type, amp, opts) {
    opts = opts || {};
    const osc = ctx.createOscillator();
    const g   = ctx.createGain();
    osc.type = type;
    osc.frequency.value = freq;
    if (opts.detune) osc.detune.value = opts.detune;
    g.gain.value = amp;

    if (opts.lfo) {
      const lfo = ctx.createOscillator();
      const lfoG = ctx.createGain();
      lfo.frequency.value = opts.lfo.rate;
      lfoG.gain.value = opts.lfo.depth;
      lfo.connect(lfoG);
      lfoG.connect(osc.frequency);
      lfo.start();
      currentNodes.push(lfo);
    }

    osc.connect(g); g.connect(parent);
    osc.start();
    currentNodes.push(osc, g);
  }

  function noise(parent, amp, opts) {
    var freq = (opts && opts.freq != null) ? opts.freq : 1000;
    var Q    = (opts && opts.Q    != null) ? opts.Q    : 1;
    const bufSize = ctx.sampleRate * 3;
    const buf = ctx.createBuffer(1, bufSize, ctx.sampleRate);
    const data = buf.getChannelData(0);
    for (let i=0; i<bufSize; i++) data[i] = Math.random()*2-1;
    const src = ctx.createBufferSource();
    src.buffer = buf; src.loop = true;
    const filt = ctx.createBiquadFilter();
    filt.type = 'lowpass'; filt.frequency.value = freq; filt.Q.value = Q;
    const g = ctx.createGain(); g.gain.value = amp;
    src.connect(filt); filt.connect(g); g.connect(parent);
    src.start();
    currentNodes.push(src, filt, g);
  }

  function tremolo(parent, freq, type, amp, rate) {
    const osc  = ctx.createOscillator();
    const lfo  = ctx.createOscillator();
    const lfoG = ctx.createGain();
    const g    = ctx.createGain();
    osc.type = type; osc.frequency.value = freq;
    lfo.frequency.value = rate; lfoG.gain.value = amp / 2;
    g.gain.value = amp / 2;
    lfo.connect(lfoG); lfoG.connect(g.gain);
    osc.connect(g); g.connect(parent);
    osc.start(); lfo.start();
    currentNodes.push(osc, lfo, lfoG, g);
  }

  function pulse(parent, freq, type, amp, opts) {
    var interval = (opts && opts.interval != null) ? opts.interval : 4000;
    var jitter   = (opts && opts.jitter   != null) ? opts.jitter   : 2000;
    var duration = (opts && opts.duration != null) ? opts.duration : 150;
    var offset   = (opts && opts.offset   != null) ? opts.offset   : 0;
    function fire() {
      if (!playing) return;
      const t = ctx.currentTime;
      const osc = ctx.createOscillator();
      const g   = ctx.createGain();
      osc.type = type; osc.frequency.value = freq;
      g.gain.setValueAtTime(0, t);
      g.gain.linearRampToValueAtTime(amp, t + 0.01);
      g.gain.linearRampToValueAtTime(0,   t + duration/1000);
      osc.connect(g); g.connect(parent);
      osc.start(t); osc.stop(t + duration/1000 + 0.05);
      const next = interval + (Math.random()-0.5)*jitter*2;
      setTimeout(fire, Math.max(200, next));
    }
    setTimeout(fire, offset + Math.random()*interval);
  }

  // ── Public API ───────────────────────────────────────────────
  function play(presetKey) {
    init();
    if (ctx.state === 'suspended') ctx.resume();
    const preset = PRESETS[presetKey] || PRESETS.default;
    if (currentPreset === presetKey && playing) return;

    // Fade out current
    const now = ctx.currentTime;
    masterGain.gain.cancelScheduledValues(now);
    masterGain.gain.setValueAtTime(masterGain.gain.value, now);
    masterGain.gain.linearRampToValueAtTime(0, now + 1.5);

    clearTimeout(fadeTimer);
    fadeTimer = setTimeout(() => {
      // Stop old nodes
      currentNodes.forEach(n => { try { n.stop ? n.stop() : n.disconnect(); } catch(e){} });
      currentNodes = [];

      // Build new layer
      const layerGain = ctx.createGain();
      layerGain.gain.value = 1;
      layerGain.connect(masterGain);
      preset.build(layerGain);
      currentNodes.push(layerGain);
      currentPreset = presetKey;

      // Fade in
      const t = ctx.currentTime;
      masterGain.gain.setValueAtTime(0, t);
      masterGain.gain.linearRampToValueAtTime(vol, t + 2);

      document.getElementById('bgm-label').textContent = preset.label;
      document.getElementById('bgm-toggle').classList.add('playing');
    }, 1600);

    playing = true;
  }

  function stop() {
    if (!ctx) return;
    playing = false;
    const now = ctx.currentTime;
    masterGain.gain.cancelScheduledValues(now);
    masterGain.gain.setValueAtTime(masterGain.gain.value, now);
    masterGain.gain.linearRampToValueAtTime(0, now + 1.5);
    clearTimeout(fadeTimer);
    fadeTimer = setTimeout(()=>{
      currentNodes.forEach(n=>{ try{ n.stop?n.stop():n.disconnect(); }catch(e){} });
      currentNodes=[]; currentPreset=null;
    }, 1600);
    document.getElementById('bgm-toggle').classList.remove('playing');
    document.getElementById('bgm-label').textContent='—';
  }

  function toggle() {
    if (playing) { stop(); }
    else { play(currentPreset || 'default'); }
  }

  function setVol(v) {
    vol = parseFloat(v);
    if (ctx && playing) {
      const now = ctx.currentTime;
      masterGain.gain.cancelScheduledValues(now);
      masterGain.gain.setValueAtTime(masterGain.gain.value, now);
      masterGain.gain.linearRampToValueAtTime(vol, now + 0.3);
    }
  }

  function transitionTo(sceneName, caseData) {
    if (!playing) return; // only transition if user has enabled BGM
    const preset = pickPreset(sceneName, caseData);
    if (preset !== currentPreset) play(preset);
  }

  function startForCase(caseData) {
    const preset = pickPreset(caseData?.scenes?.[0]?.name || '', caseData);
    play(preset);
  }

  return { play, stop, toggle, setVol, transitionTo, startForCase, pickPreset };
})();
